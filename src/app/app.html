<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-left">
    <button class="menu-btn" (click)="toggleSidebar()">☰</button>

    <div class="logo" routerLink="/">VetControl</div>
  </div>

  <div class="navbar-right">
    @if (!authService.estaLogueado()) {
      <a routerLink="/login">Iniciar sesión</a>

      <a class="register-btn" routerLink="/register"> Registrarse </a>
    }

    @if (authService.estaLogueado()) {
      <span class="usuario">
        {{ authService.usuarioActual()?.nombre }}
      </span>

      <button (click)="logout()">Cerrar sesión</button>
    }
  </div>
</header>

<!-- OVERLAY -->
@if (sidebarOpen) {
  <div class="overlay" (click)="toggleSidebar()"></div>
}

<!-- SIDEBAR -->
<aside class="sidebar" [class.open]="sidebarOpen">
  <div class="sidebar-header">
    <h2>VetControl</h2>

    <button (click)="toggleSidebar()">✕</button>
  </div>

  <nav>
    <a routerLink="/" (click)="toggleSidebar()"> Inicio </a>

    <a routerLink="/dashboard" (click)="toggleSidebar()"> Dashboard </a>

    <a routerLink="/mascotas" (click)="toggleSidebar()"> Mascotas </a>

    <a routerLink="/historial" (click)="toggleSidebar()"> Historial </a>

    <a routerLink="/turnos" (click)="toggleSidebar()"> Turnos </a>
  </nav>
</aside>

<!-- CONTENIDO -->
<main class="content">
  <router-outlet></router-outlet>
</main>
