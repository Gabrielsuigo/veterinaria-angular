<!-- LOGIN Y REGISTER -->
@if (!mostrarLayout()) {
  <router-outlet></router-outlet>
}

<!-- APP NORMAL -->
@if (mostrarLayout()) {
  <!-- NAVBAR -->
  <mat-toolbar class="navbar">
    <div class="logo">VetControl</div>

    <div class="spacer"></div>

    <div class="menu-top">
      @if (!authService.estaLogueado()) {
        <a mat-button routerLink="/login"> Iniciar sesión </a>

        <a mat-raised-button routerLink="/register"> Registrarse </a>
      }

      @if (authService.estaLogueado()) {
        <span class="usuario">
          {{ authService.usuarioActual()?.nombre }}
        </span>

        <button mat-raised-button color="warn" (click)="logout()">Cerrar sesión</button>
      }
    </div>
  </mat-toolbar>

  <!-- LAYOUT -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <mat-icon>pets</mat-icon>
        </div>
      </div>

      <nav class="menu">
        <a mat-icon-button routerLink="/dashboard">
          <mat-icon>home</mat-icon>
        </a>

        <a mat-icon-button routerLink="/mascotas">
          <mat-icon>pets</mat-icon>
        </a>

        <a mat-icon-button>
          <mat-icon>vaccines</mat-icon>
        </a>

        <a mat-icon-button>
          <mat-icon>event</mat-icon>
        </a>

        <a mat-icon-button>
          <mat-icon>medical_services</mat-icon>
        </a>

        <a mat-icon-button>
          <mat-icon>bar_chart</mat-icon>
        </a>

        <a mat-icon-button>
          <mat-icon>settings</mat-icon>
        </a>
      </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
}
